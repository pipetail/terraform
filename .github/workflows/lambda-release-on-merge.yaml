---
name: lambda-release-on-merge

# Cuts a Lambda release automatically when a version bump lands on master, and
# fails loudly when Lambda source lands *without* a bump. Consumers pin an exact
# version, so an unbumped change is inert: it sits on master and never reaches
# any deployment. That failure is otherwise silent, which is what this catches.

permissions:
  contents: read
  actions: write # to dispatch lambda-release

on:
  push:
    branches:
      - master
    paths:
      - 'src/*/**'

jobs:
  release:
    runs-on: ubuntu-latest
    name: Release bumped lambdas
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Dispatch release for bumped lambdas
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail

          # A new branch or a force-push can report an all-zero or unreachable
          # "before" SHA; fall back to the first parent.
          if ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            BEFORE=$(git rev-parse "${AFTER}^" 2>/dev/null || echo "")
          fi
          if [ -z "$BEFORE" ]; then
            echo "::notice::No usable base commit to diff against; skipping."
            exit 0
          fi

          status=0
          for pkg in src/*/package.json; do
            [ -e "$pkg" ] || continue
            lambda=$(basename "$(dirname "$pkg")")

            # Only files that end up inside the published zip count as a change.
            if ! git diff --name-only "$BEFORE" "$AFTER" -- "src/${lambda}" \
                 | grep -qE '\.(mjs|js|json)$'; then
              continue
            fi

            # Both sides read from git, not the working tree, so the comparison
            # cannot drift if the checkout is ever not exactly AFTER.
            new=$(git show "${AFTER}:${pkg}" 2>/dev/null | jq -r '.version // empty' || echo "")
            old=$(git show "${BEFORE}:${pkg}" 2>/dev/null | jq -r '.version // empty' || echo "")

            if [ -n "$old" ] && [ "$new" = "$old" ]; then
              echo "::error::src/${lambda} changed but ${pkg} is still ${new}. No release cut, so the change will not reach any consumer. Bump the version."
              status=1
              continue
            fi

            # lambda-release.yaml packages and tags aws-events-to-slack specifically.
            # Any other lambda needs that workflow extended before it can publish.
            if [ "$lambda" != "aws-events-to-slack" ]; then
              echo "::warning::${lambda} bumped to ${new}, but lambda-release.yaml only publishes aws-events-to-slack. Extend it to release ${lambda}."
              continue
            fi

            echo "Dispatching lambda-release for ${lambda} ${new}"
            # workflow_dispatch is one of the few events GITHUB_TOKEN may trigger;
            # a tag pushed with GITHUB_TOKEN would NOT start lambda-release.
            gh workflow run lambda-release.yaml --ref master -f version="${new}"
          done

          exit $status
