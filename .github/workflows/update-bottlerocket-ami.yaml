---
name: Update Bottlerocket AMI

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  update-ami:
    runs-on: ubuntu-latest
    name: Check for Bottlerocket AMI updates
    env:
      TERRAFORM_FILE: examples/05-aws-complete/eks.tf

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6
        with:
          role-to-assume: ${{ secrets.OIDC_ROLE_ARN }}
          role-session-name: GithubActionsBottlerocketAMI
          aws-region: eu-west-1

      # k8s version and architecture are read from the terraform file rather than
      # hardcoded here, so this workflow cannot drift away from what is deployed
      - name: Read pinned AMI and cluster config from Terraform
        id: current-amis
        run: |
          extract() {
            sed -n "s/.*$1[[:space:]]*=[[:space:]]*\"\([^\"]*\)\".*/\1/p" "${TERRAFORM_FILE}" | head -n1
          }

          CURRENT_AMI=$(extract worker_ami_id)
          K8S_VERSION=$(extract k8s_version)
          ARCHITECTURE=$(extract k8s_architecture)

          for pair in "worker_ami_id:${CURRENT_AMI}" "k8s_version:${K8S_VERSION}" "k8s_architecture:${ARCHITECTURE}"; do
            if [[ -z "${pair#*:}" ]]; then
              echo "::error::could not read ${pair%%:*} from ${TERRAFORM_FILE}"
              exit 1
            fi
          done

          # the SSM parameter path uses arm64, while the AMI name uses aarch64
          if [[ "${ARCHITECTURE}" == "aarch64" ]]; then
            ARCHITECTURE="arm64"
          fi

          echo "current_ami=${CURRENT_AMI}" >> "$GITHUB_OUTPUT"
          echo "k8s_version=${K8S_VERSION}" >> "$GITHUB_OUTPUT"
          echo "architecture=${ARCHITECTURE}" >> "$GITHUB_OUTPUT"

          echo "Current AMI eu-west-1: ${CURRENT_AMI} (k8s ${K8S_VERSION}, ${ARCHITECTURE})"

      - name: Get latest Bottlerocket AMI ID
        id: get-amis
        run: |
          SSM_PATH="/aws/service/bottlerocket/aws-k8s-${{ steps.current-amis.outputs.k8s_version }}/${{ steps.current-amis.outputs.architecture }}/latest/image_id"

          LATEST_AMI=$(aws ssm get-parameter \
            --name "${SSM_PATH}" \
            --region eu-west-1 \
            --query "Parameter.Value" \
            --output text)
          echo "latest_ami=${LATEST_AMI}" >> "$GITHUB_OUTPUT"

          echo "Latest AMI eu-west-1: ${LATEST_AMI}"

      - name: Get Bottlerocket version from AMI name
        id: get-version
        run: |
          AMI_NAME=$(aws ec2 describe-images \
            --image-ids "${{ steps.get-amis.outputs.latest_ami }}" \
            --region eu-west-1 \
            --query "Images[0].Name" \
            --output text)
          VERSION=$(echo "${AMI_NAME}" | sed -n 's/.*-\(v[0-9]*\.[0-9]*\.[0-9]*\)-.*/\1/p')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bottlerocket version: ${VERSION}"

      - name: Check if update is needed
        id: check-update
        run: |
          if [[ "${{ steps.get-amis.outputs.latest_ami }}" == "${{ steps.current-amis.outputs.current_ami }}" ]]; then
            echo "AMI is already up to date"
            echo "update_needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "AMI update available"
            echo "update_needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Get current Bottlerocket version
        if: steps.check-update.outputs.update_needed == 'true'
        id: current-version
        run: |
          CURRENT_AMI_NAME=$(aws ec2 describe-images \
            --image-ids "${{ steps.current-amis.outputs.current_ami }}" \
            --region eu-west-1 \
            --query "Images[0].Name" \
            --output text)
          CURRENT_VERSION=$(echo "${CURRENT_AMI_NAME}" | sed -n 's/.*-\(v[0-9]*\.[0-9]*\.[0-9]*\)-.*/\1/p')
          echo "current_version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Current Bottlerocket version: ${CURRENT_VERSION}"

      - name: Update AMI ID in Terraform
        if: steps.check-update.outputs.update_needed == 'true'
        run: |
          sed -i \
            -e "s/${{ steps.current-amis.outputs.current_ami }}/${{ steps.get-amis.outputs.latest_ami }}/" \
            -e "s/bottlerocket ${{ steps.current-version.outputs.current_version }}/bottlerocket ${{ steps.get-version.outputs.version }}/" \
            "${TERRAFORM_FILE}"
          echo "Updated AMI ID in ${TERRAFORM_FILE}"
          git diff "${TERRAFORM_FILE}"

      - name: Create Pull Request
        if: steps.check-update.outputs.update_needed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update Bottlerocket AMI to ${{ steps.get-version.outputs.version }}"
          branch: update-bottlerocket-ami
          title: "Update Bottlerocket AMI to ${{ steps.get-version.outputs.version }}"
          body: |
            Updates Bottlerocket AMI from ${{ steps.current-version.outputs.current_version }} to ${{ steps.get-version.outputs.version }}.

            | Region | Old AMI | New AMI |
            |--------|---------|---------|
            | eu-west-1 | `${{ steps.current-amis.outputs.current_ami }}` | `${{ steps.get-amis.outputs.latest_ami }}` |

            > PRs created with `GITHUB_TOKEN` won't trigger `on: pull_request` workflows automatically.
            > Close and reopen the PR to trigger the terraform plan.
          base: master
          delete-branch: true
